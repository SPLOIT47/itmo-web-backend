name: gateway

networks:
  web:
    external: true

services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web
    depends_on:
      - gateway

  gateway:
    build:
      context: ..
      dockerfile: Gateway/Dockerfile
    image: gateway:local
    env_file:
      - .env
    ports:
      - "4000:4000"
    networks:
      - web
    mem_limit: 300m
    cpus: "0.5"
    restart: on-failure